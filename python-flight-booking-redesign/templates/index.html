<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Booking - THE BETTER FARE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(135deg, #6B46C1 0%, #8B5CF6 100%); color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .section { padding: 30px; border-bottom: 1px solid #e5e7eb; }
        .section h3 { color: #1f2937; font-size: 18px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #6B46C1; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: 500; color: #374151; margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea { padding: 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 14px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #6B46C1; box-shadow: 0 0 0 3px rgba(107, 70, 193, 0.1); }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #6B46C1; color: white; }
        .btn-primary:hover { background: #553C9A; }
        .btn-secondary { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
        .btn-secondary:hover { background: #e5e7eb; }
        .btn-success { background: #10b981; color: white; font-size: 16px; padding: 15px 30px; }
        .btn-success:hover { background: #059669; }
        .controls { display: flex; gap: 10px; margin: 20px 0; }
        .segment-item, .passenger-item { background: #f9fafb; padding: 20px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #e5e7eb; }
        .segment-header, .passenger-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .generate-section { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; padding: 30px; text-align: center; }
        .message { padding: 15px; border-radius: 6px; margin: 20px 0; }
        .success { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
        .error { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
        .loading { opacity: 0.6; pointer-events: none; }
        .baggage-note { font-size: 12px; color: #666; background: #f8f9fa; padding: 10px; border-radius: 4px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>THE BETTER FARE</h1>
            <p>Atypical Agency - Professional Flight Booking System</p>
        </div>

        <div class="section">
            <h3>Company Logo Upload</h3>
            <div class="form-group">
                <label for="logoUpload">Upload Your Company Logo</label>
                <input type="file" id="logoUpload" accept="image/*">
                <div id="logoPreview" style="margin-top: 10px; display: none;">
                    <img id="logoImg" style="max-height: 60px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
            </div>
        </div>

        <form id="bookingForm">
            <div class="section">
                <h3>Contact Information</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Contact Name *</label>
                        <input type="text" name="contact_name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address *</label>
                        <input type="email" name="contact_email" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" name="contact_phone" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Emergency Contact Name</label>
                        <input type="text" name="emergency_contact_name">
                    </div>
                    <div class="form-group">
                        <label>Emergency Contact Phone</label>
                        <input type="tel" name="emergency_contact_phone">
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>Flight Details</h3>
                <div class="controls">
                    <button type="button" class="btn btn-secondary" onclick="addSegment()">Add Flight Segment</button>
                    <button type="button" class="btn btn-secondary" onclick="removeSegment()">Remove Last Segment</button>
                </div>
                <div id="segments-container"></div>
            </div>

            <div class="section">
                <h3>Passenger Information</h3>
                <div class="controls">
                    <button type="button" class="btn btn-secondary" onclick="addPassenger()">Add Passenger</button>
                    <button type="button" class="btn btn-secondary" onclick="removePassenger()">Remove Last Passenger</button>
                </div>
                <div id="passengers-container"></div>
            </div>

            <div class="section">
                <h3>Special Requests</h3>
                <div class="form-group">
                    <label>Additional Information</label>
                    <textarea name="special_requests" rows="3" placeholder="Any special requirements, dietary restrictions, mobility assistance, etc."></textarea>
                </div>
            </div>

            <div class="generate-section">
                <h3>Generate Your E-Ticket</h3>
                <p>Complete the form above and click below to create your professional e-ticket PDF</p>
                <button type="submit" class="btn btn-success">Generate E-Ticket PDF</button>
            </div>
        </form>

        <div id="messages"></div>
    </div>

    <script>
        let segmentCount = 0;
        let passengerCount = 0;

        document.addEventListener('DOMContentLoaded', function() {
            addSegment();
            addPassenger();
            
            // Logo upload handler
            document.getElementById('logoUpload').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        document.getElementById('logoImg').src = e.target.result;
                        document.getElementById('logoPreview').style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                }
            });
        });

        function addSegment() {
            if (segmentCount >= 6) return;
            segmentCount++;
            
            const container = document.getElementById('segments-container');
            const segmentDiv = document.createElement('div');
            segmentDiv.className = 'segment-item';
            segmentDiv.innerHTML = `
                <div class="segment-header">
                    <h4>Flight Segment ${segmentCount}</h4>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Departure City *</label>
                        <input type="text" name="segments[${segmentCount-1}][departure_city]" placeholder="e.g. Karachi" required>
                    </div>
                    <div class="form-group">
                        <label>Arrival City *</label>
                        <input type="text" name="segments[${segmentCount-1}][arrival_city]" placeholder="e.g. Doha" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Departure Date *</label>
                        <input type="date" name="segments[${segmentCount-1}][departure_date]" required>
                    </div>
                    <div class="form-group">
                        <label>Departure Time *</label>
                        <input type="time" name="segments[${segmentCount-1}][departure_time]" required>
                    </div>
                    <div class="form-group">
                        <label>Arrival Date *</label>
                        <input type="date" name="segments[${segmentCount-1}][arrival_date]" required>
                    </div>
                    <div class="form-group">
                        <label>Arrival Time *</label>
                        <input type="time" name="segments[${segmentCount-1}][arrival_time]" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Flight Number *</label>
                        <input type="text" name="segments[${segmentCount-1}][flight_number]" placeholder="e.g. QR605" required>
                    </div>
                    <div class="form-group">
                        <label>Operated By *</label>
                        <input type="text" name="segments[${segmentCount-1}][airline]" placeholder="e.g. Qatar Airways" required>
                    </div>
                    <div class="form-group">
                        <label>Class *</label>
                        <select name="segments[${segmentCount-1}][seat_class]" required>
                            <option value="">Select Class</option>
                            <option value="Economy">Economy</option>
                            <option value="Premium Economy">Premium Economy</option>
                            <option value="Business">Business</option>
                            <option value="First">First</option>
                        </select>
                    </div>
                </div>
            `;
            container.appendChild(segmentDiv);
        }

        function removeSegment() {
            if (segmentCount <= 1) return;
            const container = document.getElementById('segments-container');
            container.removeChild(container.lastChild);
            segmentCount--;
        }

        function addPassenger() {
            if (passengerCount >= 6) return;
            passengerCount++;
            
            const container = document.getElementById('passengers-container');
            const passengerDiv = document.createElement('div');
            passengerDiv.className = 'passenger-item';
            passengerDiv.innerHTML = `
                <div class="passenger-header">
                    <h4>Passenger ${passengerCount}</h4>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Title *</label>
                        <select name="passengers[${passengerCount-1}][title]" required>
                            <option value="">Select Title</option>
                            <option value="Mr">Mr</option>
                            <option value="Mrs">Mrs</option>
                            <option value="Ms">Ms</option>
                            <option value="Miss">Miss</option>
                            <option value="Dr">Dr</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Passenger Name (Manual Entry) *</label>
                        <input type="text" name="passengers[${passengerCount-1}][first_name]" placeholder="UR REHMAN/HABIB" autocomplete="off" spellcheck="false" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name *</label>
                        <input type="text" name="passengers[${passengerCount-1}][last_name]" placeholder="Enter last name" autocomplete="off" spellcheck="false" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Date of Birth *</label>
                        <input type="date" name="passengers[${passengerCount-1}][date_of_birth]" required>
                    </div>
                    <div class="form-group">
                        <label>Nationality *</label>
                        <input type="text" name="passengers[${passengerCount-1}][nationality]" placeholder="e.g. Pakistani" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Baggage Quantity</label>
                        <input type="number" name="passengers[${passengerCount-1}][baggage_quantity]" min="0" max="10" value="1" placeholder="2">
                    </div>
                    <div class="form-group">
                        <label>Baggage Weight</label>
                        <input type="text" name="passengers[${passengerCount-1}][baggage_weight]" value="23kg" placeholder="25kg">
                    </div>
                </div>
                <div class="baggage-note">
                    <div>1x 7kg Hand baggage</div>
                    <div>1x Personal Bag included</div>
                </div>
            `;
            container.appendChild(passengerDiv);
        }

        function removePassenger() {
            if (passengerCount <= 1) return;
            const container = document.getElementById('passengers-container');
            container.removeChild(container.lastChild);
            passengerCount--;
        }

        function showMessage(message, type) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = message;
            messagesDiv.innerHTML = '';
            messagesDiv.appendChild(messageDiv);
            
            setTimeout(() => messageDiv.remove(), 5000);
        }

        document.getElementById('bookingForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const form = e.target;
            const formData = new FormData(form);
            
            const data = {
                contact_name: formData.get('contact_name'),
                contact_email: formData.get('contact_email'),
                contact_phone: formData.get('contact_phone'),
                emergency_contact_name: formData.get('emergency_contact_name') || '',
                emergency_contact_phone: formData.get('emergency_contact_phone') || '',
                special_requests: formData.get('special_requests') || '',
                flight_segments: [],
                passengers: []
            };
            
            for (let i = 0; i < segmentCount; i++) {
                data.flight_segments.push({
                    departure_city: formData.get(`segments[${i}][departure_city]`),
                    arrival_city: formData.get(`segments[${i}][arrival_city]`),
                    departure_date: formData.get(`segments[${i}][departure_date]`),
                    departure_time: formData.get(`segments[${i}][departure_time]`),
                    arrival_date: formData.get(`segments[${i}][arrival_date]`),
                    arrival_time: formData.get(`segments[${i}][arrival_time]`),
                    flight_number: formData.get(`segments[${i}][flight_number]`),
                    airline: formData.get(`segments[${i}][airline]`),
                    seat_class: formData.get(`segments[${i}][seat_class]`)
                });
            }
            
            for (let i = 0; i < passengerCount; i++) {
                data.passengers.push({
                    title: formData.get(`passengers[${i}][title]`),
                    first_name: formData.get(`passengers[${i}][first_name]`),
                    last_name: formData.get(`passengers[${i}][last_name]`),
                    date_of_birth: formData.get(`passengers[${i}][date_of_birth]`),
                    nationality: formData.get(`passengers[${i}][nationality]`),
                    baggage_quantity: formData.get(`passengers[${i}][baggage_quantity]`) || '1',
                    baggage_weight: formData.get(`passengers[${i}][baggage_weight]`) || '23kg'
                });
            }
            
            try {
                form.classList.add('loading');
                
                const response = await fetch('/api/booking', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `eticket_${Date.now()}.pdf`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                    
                    showMessage('E-ticket generated successfully!', 'success');
                } else {
                    showMessage('Failed to generate e-ticket', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            } finally {
                form.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
